<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>CSS Selectors</title>
    <style>

       /* element selector  */
        p{
            color: red;
        }

        /* id selector */
        #redElement{
            color: blue;
        }

        /* class selector */
        .greenElement{
            color: green;
        }

        /* descendent selector */
        div p{
            color: blueviolet;
            }

        /* grouping selector */
        footer, span{
            background-color: yellow;
        }
    </style>

</head>
<body>
    <h3>This is CSS</h3>
    <p>Here we learn everything about HTML/CSS</p>

    <h3>CSS Selectors</h3>
    <p class="greenElement">This is the paragrph to demonstrate css selectors</p>
    <p id="redElement">This is the another paragrph to demonstrate css selectors</p>
    <div>
        <p>This is the yet another paragrph to demonstrate css selectors</p>
        <span>This is span</span>
    </div>
    <footer>This is footer</footer>

</body>
</html>
