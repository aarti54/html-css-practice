<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Height, width, borders and backgrounds</title>
    <style>
        #firstPara{
            background-color: red;
            height: 100px;
            width: 455px;
            border-width: 4px;
            border: 3px blue solid;
            /* border-color: rgb(52, 51, 132);
            border-style: solid; */
            border-radius: 13px;
        }

        #secondPara{
            background-color: greenyellow;
            height: 100px;
            width: 455px;
            border-top: 2px solid rgb(68, 146, 50);
            border-right: 2px solid rgb(54, 140, 167);
            border-bottom: 2px solid rgb(165, 100, 47);
            border-left: 2px solid rgb(24, 15, 39);
            border-top-left-radius: 15px;
        }

        #thirdPara{
            height: 500px;
            width: 500px;
            background-image: url(https://avatars.githubusercontent.com/u/105009119?s=400&u=b08121d22006220da4d0418d7e15bb456afb2b32&v=4);
            border: 2px solid red;
            background-repeat: no-repeat;
            background-position: center center;

        }
    </style>
</head>
<body>
    <h3>This is heading</h3>
    <p id="firstPara">This is paragraph</p>

    <p id="secondPara">This is paragraph</p>

    <p id="thirdPara">This is paragraph</p>
</body>
</html>
